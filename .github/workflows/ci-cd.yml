# Name of the workflow shown in GitHub Actions
name: CI/CD Pipeline

# Defines when this workflow runs
on:
  push:
    branches: [ "main" ]   # run automatically when code is pushed to main branch
  workflow_dispatch:       # allows manual triggering from GitHub UI

# Permissions granted to this workflow
permissions:
  contents: write          # allows committing/pushing to repositories (used for GitOps repo updates)
  packages: write          # allows pushing Docker images to GitHub Container Registry (GHCR)

# Controls how multiple runs behave
concurrency:
  group: gitops-${{ github.ref }}   # groups runs by branch/reference
  cancel-in-progress: false         # do NOT cancel previous runs if a new one starts

# Global environment variables used throughout the workflow
env:
  REGISTRY: ghcr.io                # Docker registry being used (GitHub Container Registry)
  SERVICES: backend,transactions,studentportfolio,syncer  # list of services (not directly used in matrix below but informative)
  TARGET_BRANCH: main              # target branch in the GitOps repo

# Define jobs that the workflow will execute
jobs:

  # First job: build and push Docker images
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest        # runs on a Linux GitHub runner

    # Matrix allows running this job multiple times in parallel (one per service)
    strategy:
      matrix:
        service: [backend, transactions, studentportfolio, syncer]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # fetch full git history (not just latest commit)

      - name: Check service has a Dockerfile
        id: check
        run: |
          # check if a Dockerfile exists inside the service folder
          if [ -f "./${{ matrix.service }}/Dockerfile" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"   # mark build as true
          else
            echo "build=false" >> "$GITHUB_OUTPUT"  # mark build as false
            echo "No Dockerfile for ${{ matrix.service }} — skipping."
          fi

      - name: Set lowercase owner
        if: steps.check.outputs.build == 'true'   # only run if Dockerfile exists
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
        # converts GitHub repo owner name to lowercase and stores it as env variable

      - name: Log in to GHCR
        if: steps.check.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}                  # ghcr.io
          username: ${{ github.repository_owner }}       # GitHub username/org
          password: ${{ secrets.CR_PAT }}                # Personal Access Token (secret)
        # logs into GitHub Container Registry so images can be pushed

      - name: Set up Docker Buildx
        if: steps.check.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3
        # sets up Docker Buildx (advanced builder for building images)

      - name: Build & push ${{ matrix.service }}
        if: steps.check.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}   # build context = service folder
          push: true                        # push image after building

          tags: |
            # tag image as "latest"
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ github.event.repository.name }}-${{ matrix.service }}:latest

            # tag image with commit SHA for version tracking
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ github.event.repository.name }}-${{ matrix.service }}:${{ github.sha }}

          provenance: false   # disables provenance metadata
          sbom: false         # disables Software Bill of Materials generation

  # Second job: update GitOps repository with new image tags
  update-gitops:
    name: Update GitOps manifests
    runs-on: ubuntu-latest

    needs: build-and-push   # ensures this job runs AFTER build-and-push completes

    steps:
      - name: Checkout app repo (for k8s folder)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        # checks out current repository so we can access k8s manifests

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
        # again ensures owner name is lowercase

      - name: Update GitOps repository (handles empty repo)
        shell: bash
        env:
          REGISTRY: ${{ env.REGISTRY }}                 # ghcr.io
          OWNER: ${{ env.OWNER_LC }}                    # lowercase owner
          APP_REPO: ${{ github.event.repository.name }} # repo name
          GITOPS_REPO: ${{ secrets.GITOPS_REPO }}       # GitOps repo (stored in secrets)
          GIT_TOKEN: ${{ secrets.GITOPS_PAT }}          # token for pushing to GitOps repo
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}       # branch to update

        run: |
          set -euo pipefail
          # -e: exit on error
          # -u: error on undefined variables
          # -o pipefail: fail if any command in a pipeline fails

          # clean up secrets to remove any hidden newline characters
          GITOPS_REPO="$(printf '%s' "$GITOPS_REPO" | tr -d '\r\n')"
          GIT_TOKEN="$(printf '%s' "$GIT_TOKEN" | tr -d '\r\n')"

          # ---- Git identity & credentials
          git config --global user.name  "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config --global credential.helper store
          printf "https://%s:x-oauth-basic@github.com" "$GIT_TOKEN" > ~/.git-credentials
          # configures git so this workflow can authenticate and push changes

          # ---- Clone or init GitOps repo
          workdir="$(mktemp -d)"   # create temporary working directory
          echo "Cloning GitOps repo ${GITOPS_REPO} ..."
          if git clone "https://github.com/${GITOPS_REPO}.git" "$workdir/gitops"; then
            cd "$workdir/gitops"   # go into cloned repo
          else
            echo "Repo not found or no access, initializing new repository structure..."
            mkdir -p "$workdir/gitops"
            cd "$workdir/gitops"
            git init                           # initialize new git repo
            git remote add origin "https://github.com/${GITOPS_REPO}.git"
          fi

          # ---- Ensure we're on TARGET_BRANCH even if repo is empty
          if ! git rev-parse --verify HEAD >/dev/null 2>&1; then
            git checkout --orphan "${TARGET_BRANCH}"   # create orphan branch if repo is empty
          else
            if git ls-remote --exit-code --heads origin "${TARGET_BRANCH}" >/dev/null 2>&1; then
              git checkout "${TARGET_BRANCH}"          # switch to existing branch
            else
              git checkout -b "${TARGET_BRANCH}"       # create branch if it doesn't exist
            fi
          fi

          # ---- Bring over k8s manifests
          if [ ! -d "${GITHUB_WORKSPACE}/k8s" ]; then
            echo "::warning:: No k8s/ directory found in app repo; nothing to copy."
            mkdir -p k8s
          else
            if command -v rsync >/dev/null 2>&1; then
              rsync -a --delete "${GITHUB_WORKSPACE}/k8s/" "./k8s/"
              # sync k8s folder (preferred method)
            else
              rm -rf ./k8s
              mkdir -p ./k8s
              cp -R "${GITHUB_WORKSPACE}/k8s/." "./k8s/"
              # fallback copy if rsync not available
            fi
          fi

          # Replace placeholder image paths with real ones
          find k8s -type f -name "*deployment*.yaml" -print0 | xargs -0 sed -i -E \
            "s|image:\s*ghcr\.io/OWNER/REPO-([a-z0-9._-]+):[^[:space:]]+|image: ${REGISTRY}/${OWNER}/${APP_REPO}-\1:latest|g"

          # Remove Windows carriage returns and trailing spaces
          find k8s -type f -name "*deployment*.yaml" -print0 | xargs -0 sed -i 's/\r$//; s/[[:space:]]\+$//'

          # Update image tags to current commit SHA
          while IFS= read -r -d '' f; do
            sed -i -E "s|(image:\s*${REGISTRY}/${OWNER}/${APP_REPO}-[a-z0-9._-]+:)[^[:space:]]+|\1${GITHUB_SHA}|g" "$f"
          done < <(find k8s -type f -name "*deployment*.yaml" -print0)

          # Another pass to update tags (same goal, applied to collected files)
          shopt -s nullglob
          mapfile -d '' files < <(find k8s -type f -name "*deployment*.yaml" -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::warning:: No deployment YAMLs found under k8s/. Skipping tag bump."
          else
            for f in "${files[@]}"; do
              sed -i -E "s|(image:\s*${REGISTRY}/${OWNER}/${APP_REPO}-[a-z0-9._-]+:)[^[:space:]]+|\\1${GITHUB_SHA}|g" "$f"
            done
          fi

          # Stage all changes
          git add -A

          # Commit only if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "GitOps: update images to ${GITHUB_SHA}"
          fi

          # Reset remote with authentication and push changes
          git remote remove origin >/dev/null 2>&1 || true
          git remote add origin "https://${GIT_TOKEN}@github.com/${GITOPS_REPO}.git"
          git push -u origin "${TARGET_BRANCH}"